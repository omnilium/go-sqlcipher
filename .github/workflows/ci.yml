name: CI

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CGO_ENABLED: "1"
  GOFLAGS: "-trimpath"

jobs:
  # Build and Test run across every supported OS/arch target: the SQLCipher cgo
  # build and its OpenSSL linkage are platform-specific, so a green Linux x64
  # run says nothing about ARM64 or Apple Silicon. Lint and Vuln are static,
  # platform-agnostic analyses and run once on Linux x64.
  #
  # House rule (writing-workflows): every job/leg runs on Blacksmith, never a
  # GitHub-hosted runner. 2 vCPU is the like-for-like Linux default (compiling
  # the single-file amalgamation doesn't parallelize across cores); macOS starts
  # at Blacksmith's smallest size, 6 vCPU.
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - target: linux-arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - target: macos-arm64
            runner: blacksmith-6vcpu-macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Build
        run: go build ./...

  race:
    name: Test (race, ${{ matrix.target }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            runner: blacksmith-2vcpu-ubuntu-2404
          - target: linux-arm64
            runner: blacksmith-2vcpu-ubuntu-2404-arm
          - target: macos-arm64
            runner: blacksmith-6vcpu-macos-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: go test -race
        run: go test -race ./...

  lint:
    name: Lint
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

  vuln:
    name: Vulnerability scan
    runs-on: blacksmith-2vcpu-ubuntu-2404
    steps:
      - uses: actions/checkout@v6
      - uses: ./.github/actions/setup
      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - name: govulncheck
        run: govulncheck ./...
